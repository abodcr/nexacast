version: "3.9"

services:
  srs:
    image: ossrs/srs:5
    container_name: streambox-srs
    ports:
      - "1935:1935"
      - "1985:1985"
      - "8080:8080"
    volumes:
      - ./srs/srs.conf:/usr/local/srs/conf/srs.conf:ro
      - hls_data:/var/lib/streambox/hls
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: streambox-nginx
    ports:
      - "8081:8081"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/hls.conf:/etc/nginx/conf.d/hls.conf:ro
      - hls_data:/var/lib/streambox/hls:ro
    depends_on:
      - srs
    restart: unless-stopped

  api:
    build:
      context: ./api
    container_name: streambox-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      HLS_DIR: /var/lib/streambox/hls
      PUBLIC_HLS_BASE: http://127.0.0.1:8081
      DB_PATH: /data/channels.json
      USERS_DB_PATH: /data/users.json
    volumes:
      - hls_data:/var/lib/streambox/hls
      - ./api/data:/data
    depends_on:
      - nginx
    restart: unless-stopped

  ui:
    build:
      context: ./ui
    container_name: streambox-ui
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  hls_data:
